name: Deploy docs preview to GitHub Pages

# Builds the same static render harness used in CI (tools/preview) and publishes it to GitHub
# Pages, so the "Docs: online" badge points at a live, always-current rendering of the repo.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install preview deps
        run: npm --prefix tools/preview install

      - name: Build static preview
        run: node tools/preview/build.mjs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: tools/preview/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
